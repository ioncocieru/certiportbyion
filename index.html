<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сайт в разработке</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="shortcut icon" type="image/x-icon" href="Logo.jpg" />
</head>
<body>
  <div class="lang-switch">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ro')">RO</button>
  </div>

  <div class="container">
    <h1 id="title">🚧 Сайт находится в разработке 🚧</h1>
    <p id="text">Совсем скоро здесь появится что-то интересное!</p>

    <p id="byline" class="byline">
      Сайт разрабатывается Cocieru Ion
    </p>

    <a
      id="contact"
      class="btn"
      href="https://www.instagram.com/thecocieru/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Instagram @thecocieru"
    >
      Связаться в Instagram
    </a>
  </div>

  <footer>© 2025 Cocieru Ion</footer>
  <script src="script.js"></script>
</body>
</html>
